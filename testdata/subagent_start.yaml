hooks:
  subagent_context:
    event_name: SubagentStart
    when: "event.agent_type == 'code-reviewer'"
    action:
      respond:
        hookSpecificOutput:
          hookEventName: SubagentStart
          additionalContext: "Focus on correctness bugs first"
    tests:
      inject_for_reviewer:
        inputs:
          - agent_type: "code-reviewer"
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: SubagentStart
              additionalContext: "Focus on correctness bugs first"
      skip_other_agents:
        inputs:
          - agent_type: "general-purpose"
        result:
