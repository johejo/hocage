hooks:
  base_hook:
    event_name: PreToolUse
    matcher: Bash
    when: event.tool_input.command.contains("echo")
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: allow
  shared_hook:
    event_name: PostToolUse
    matcher: Bash
    when: event.tool_input.command.contains("ls")
    action:
      respond:
        decision: block
        reason: "from base"
