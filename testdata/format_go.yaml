hooks:
  format_go:
    event_name: PostToolUse
    matcher: Write
    when: event.tool_input.file_path.endsWith(".go")
    action:
      command: 'gofmt -w "$FILE"'
      env:
        FILE: event.tool_input.file_path
    tests:
      should_skip:
        inputs:
          - tool_input: { file_path: "/tmp/main.py" }
        result:
