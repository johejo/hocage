hooks:
  interpolated_respond:
    event_name: PreToolUse
    matcher: Bash
    when: event.tool_input.command.contains("rm -rf")
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: deny
          permissionDecisionReason: "{{event.tool_input.command}} is not allowed"
    tests:
      should_block_with_interpolation:
        inputs:
          - tool_input: { command: "rm -rf /" }
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: PreToolUse
              permissionDecision: deny
              permissionDecisionReason: "rm -rf / is not allowed"
