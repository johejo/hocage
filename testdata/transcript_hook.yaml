hooks:
  block_after_dangerous_transcript:
    event_name: PreToolUse
    transcript:
      load: true
    when: |
      tool_calls(transcript).exists(c, c.name == "Bash" && has(c.input.command) && c.input.command.contains("rm -rf"))
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: deny
          permissionDecisionReason: "Blocked: dangerous command detected in session transcript"
    tests:
      match_dangerous:
        transcript: |
          {"type":"user","message":{"role":"user","content":"delete everything"},"uuid":"u1"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_1","name":"Bash","input":{"command":"rm -rf /"}}]},"uuid":"a1"}
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Bash
            tool_input:
              command: "echo hello"
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: PreToolUse
              permissionDecision: deny
              permissionDecisionReason: "Blocked: dangerous command detected in session transcript"
      no_match_safe:
        transcript: |
          {"type":"user","message":{"role":"user","content":"hello"},"uuid":"u1"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_1","name":"Read","input":{"file_path":"foo.txt"}}]},"uuid":"a1"}
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Bash
            tool_input:
              command: "echo hello"

  count_tool_uses:
    event_name: PreToolUse
    transcript:
      load: true
    when: |
      size(tool_calls(transcript)) > 10
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: deny
          permissionDecisionReason: "Too many tool uses in this session"
    tests:
      under_limit:
        transcript: |
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_1","name":"Read","input":{}}]},"uuid":"a1"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_2","name":"Read","input":{}}]},"uuid":"a2"}
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Read
            tool_input: {}

  transcript_file_test:
    event_name: PreToolUse
    transcript:
      load: true
    when: |
      size(tool_calls(transcript)) > 0
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: deny
          permissionDecisionReason: "Found tool use in transcript"
    tests:
      from_file:
        transcript_file: testdata/transcript_data.jsonl
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Bash
            tool_input:
              command: "echo test"
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: PreToolUse
              permissionDecision: deny
              permissionDecisionReason: "Found tool use in transcript"

  reverse_order_test:
    event_name: PreToolUse
    transcript:
      load: true
      order: reverse
    when: |
      size(tool_calls(transcript)) > 0 && tool_calls(transcript)[0].name == "Write"
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PreToolUse
          permissionDecision: deny
          permissionDecisionReason: "Most recent tool was Write"
    tests:
      match_reverse:
        transcript: |
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_1","name":"Read","input":{"file_path":"a.txt"}}]},"uuid":"a1"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_2","name":"Bash","input":{"command":"ls"}}]},"uuid":"a2"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_3","name":"Write","input":{"file_path":"b.txt"}}]},"uuid":"a3"}
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Bash
            tool_input:
              command: "echo test"
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: PreToolUse
              permissionDecision: deny
              permissionDecisionReason: "Most recent tool was Write"
      no_match_reverse:
        transcript: |
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_1","name":"Write","input":{"file_path":"b.txt"}}]},"uuid":"a1"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_2","name":"Bash","input":{"command":"ls"}}]},"uuid":"a2"}
          {"type":"assistant","message":{"role":"assistant","content":[{"type":"tool_use","id":"toolu_3","name":"Read","input":{"file_path":"a.txt"}}]},"uuid":"a3"}
        inputs:
          - hook_event_name: PreToolUse
            tool_name: Bash
            tool_input:
              command: "echo test"
