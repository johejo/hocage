hooks:
  allow_read_tools:
    event_name: PermissionRequest
    matcher: Read
    when: "event.tool_name == 'Read'"
    action:
      respond:
        decision: allow
        reason: "Read tool is always allowed"
    tests:
      allow_read:
        inputs:
          - tool_name: Read
        result:
          stdout:
            decision: allow
            reason: "Read tool is always allowed"
      deny_non_read:
        inputs:
          - tool_name: Write
        result:
