hooks:
  allow_read_tools:
    event_name: PermissionRequest
    matcher: Read
    when: "event.tool_name == 'Read'"
    action:
      respond:
        hookSpecificOutput:
          hookEventName: PermissionRequest
          decision:
            behavior: allow
    tests:
      allow_read:
        inputs:
          - tool_name: Read
        result:
          stdout:
            hookSpecificOutput:
              hookEventName: PermissionRequest
              decision:
                behavior: allow
      deny_non_read:
        inputs:
          - tool_name: Write
        result:
